input:
  vdw_scores: "../../aimd_data/intermediates_enol2_H_dataset/vdw/vdw_scores_clean.csv" 
  bond_events: "../bond_change_detection/outputs_enol2_H/bond_events.csv"
  bond_interface_counts: "../bond_change_detection/outputs_enol2_H/bond_interface_counts.csv"
  coordination_events: "../zn_o_coordination/outputs_enol2_H/coordination_events.csv"

labels:
  mode: "heuristic"
  vdw_score_column: "vdw_total_score"
  vdw_positive_percentile: 90
  min_event_count: 1
  min_interface_count: 1

model:
  backend: "pytorch"
  task: "binary_classification"
  hidden_dims: [128, 64, 32]
  dropout: 0.1
  epochs: 40
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  seed: 42

selection:
  score_column: "selection_score"
  threshold: 0.7
  top_k: 500

output:
  root: "outputs"
  scores_csv: "selector_scores.csv"
  selected_csv: "selected_structures.csv"
  selected_dir: "high_value_frames"
  summary_json: "summary.json"
