input:
  trajectory: "../aimd_scripts/AIMD_dataset/cif_frames"
  format: "cif_dir"
  selection:
    start_frame: 0
    end_frame:
    frame_stride: 1
    max_frames:

predictor:
  backend: "heuristic_lj_proxy"
  bond_cutoff_scale: 1.1
  contact_factor: 1.35
  close_contact_ratio: 1.05
  close_contact_weight: 0.15
  contact_density_weight: 0.30
  fallback_min_distance: 10.0
  pair_weights:
    organic_surface: 1.3
    water_surface: 1.0
    organic_water: 0.8

selection:
  score_column: "vdw_total_score"
  top_k: 100

output:
  root: "outputs"
  scores_csv: "vdw_scores.csv"
  selected_csv: "selected_structures.csv"
  selected_dir: "high_vdw_frames"
  summary_json: "summary.json"
